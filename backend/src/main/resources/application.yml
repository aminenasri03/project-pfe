spring:
  application:
    name: recruitment

  datasource:
    url: jdbc:postgresql://localhost:5432/recruitment_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:2026}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

management:
  endpoint:
    health:
      show-details: never
  health:
    defaults:
      enabled: false

app:
  cors:
    allowed-origins: http://localhost:4200
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-a-very-long-random-secret-key-min-256-bits}
    expiration-ms: 3600000      # 1 hour
    refresh-expiration-ms: 604800000  # 7 days
  storage:
    cv-dir: ${CV_STORAGE_DIR:./uploads/cv}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.recruitment.controller
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

logging:
  level:
    org.springframework.security: INFO
    com.recruitment: DEBUG
